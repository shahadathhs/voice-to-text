name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install all dependencies
        run: make install-deps

      - name: Run linting
        run: make lint

      - name: Run type checking
        run: make type-check

      - name: Run security scan
        run: make security

      - name: Build package
        run: make build
