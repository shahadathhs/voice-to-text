name: Setup Repository Labels

on:
  # Run on workflow dispatch for manual triggering
  workflow_dispatch:
  # Run when this workflow file changes
  push:
    paths:
      - '.github/workflows/setup-labels.yml'
      - '.github/labels-config.yml'
    branches:
      - main
  # Run on pull_request to ensure labels exist for Dependabot
  pull_request:
    types: [opened, synchronize]

jobs:
  create-labels:
    name: Create Labels
    runs-on: ubuntu-latest
    # Run for manual triggers, pushes to main, or Dependabot PRs
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || contains(github.event.pull_request.user.login, 'dependabot') || github.actor == 'shahadathhs'

    steps:
      - name: Create repository labels
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labels = [
              {
                name: 'dependencies',
                color: '0366d6',
                description: 'Related to project dependencies and packages'
              },
              {
                name: 'python',
                color: '3572A5',
                description: 'Python-related changes'
              },
              {
                name: 'docker',
                color: '384d54',
                description: 'Docker-related changes'
              },
              {
                name: 'github-actions',
                color: '2088FF',
                description: 'GitHub Actions workflow changes'
              },
              {
                name: 'bug',
                color: 'd73a4a',
                description: 'Something isn\'t working'
              },
              {
                name: 'enhancement',
                color: 'a2eeef',
                description: 'New feature or request'
              },
              {
                name: 'documentation',
                color: '0075ca',
                description: 'Documentation changes'
              },
              {
                name: 'high-priority',
                color: 'b60205',
                description: 'High priority issue or PR'
              },
              {
                name: 'medium-priority',
                color: 'fbca04',
                description: 'Medium priority issue or PR'
              },
              {
                name: 'low-priority',
                color: '7057ff',
                description: 'Low priority issue or PR'
              },
              {
                name: 'cli',
                color: '5319e7',
                description: 'CLI interface changes'
              },
              {
                name: 'api',
                color: '0e8a16',
                description: 'API endpoint changes'
              }
            ];

            const { owner, repo } = context.repo;

            for (const label of labels) {
              try {
                // Try to create the label
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
                console.log(`✅ Created label: ${label.name}`);
              } catch (error) {
                // If label already exists, that's fine
                if (error.status === 422) {
                  console.log(`ℹ️  Label already exists: ${label.name}`);

                  // Update existing label to ensure it has correct description/color
                  try {
                    await github.rest.issues.updateLabel({
                      owner,
                      repo,
                      name: label.name,
                      color: label.color,
                      description: label.description
                    });
                    console.log(`🔄 Updated label: ${label.name}`);
                  } catch (updateError) {
                    console.log(`⚠️  Could not update label ${label.name}: ${updateError.message}`);
                  }
                } else {
                  console.log(`❌ Error creating label ${label.name}: ${error.message}`);
                }
              }
            }

            console.log('🎉 Label setup complete!');
