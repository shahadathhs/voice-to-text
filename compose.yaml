services:
  whisper:
    build: .
    container_name: voice-to-text-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    volumes:
      # Mount audio directory for input files
      - ./audio:/app/audio:ro
      # Mount transcripts directory for output files
      - ./transcripts:/app/transcripts
      # Persist model caches (avoids re-download on restart)
      - ./model-cache:/root/.cache
      # Mount source code for development (hot reload)
      - .:/app
    working_dir: /app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/docs || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    command: uv run uvicorn server:app --host 0.0.0.0 --port 8000 --reload

volumes:
  model-cache:
    driver: local
