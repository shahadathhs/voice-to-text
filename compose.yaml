services:
  api:
    build: .
    container_name: ${PACKAGE_NAME}-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    volumes:
      # Mount media directory (contains audio and transcripts)
      - ./media:/app/media
      # Persist model cache (avoids re-download on restart)
      - model-cache:/app/model-cache
    working_dir: /app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/docs || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    command: uv run uvicorn server:app --host 0.0.0.0 --port 8000

volumes:
  model-cache:
    driver: local
